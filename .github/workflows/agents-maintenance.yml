name: Agents Maintenance

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  swarm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run agent orchestrator
        run: bash scripts/agents/orchestrator.sh
