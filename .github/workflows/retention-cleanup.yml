name: Retention Cleanup

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: bash scripts/retention-cleanup.sh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RETENTION_DAYS: 90
