name: Resolve Merge Conflicts and Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch a ser sincronizada com main"
        required: true
        default: "main"
      deploy_prod:
        description: "Fazer deploy em produção após sucesso"
        required: true
        default: "false"
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  merge-resolve:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Auto-resolve and sync with main
        run: bash scripts/resolve-merge-and-deploy.sh main "${SOURCE_BRANCH}"
        env:
          CI: true
          SOURCE_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.head_ref }}
          AUTO_RESOLVE_CODE: ${{ vars.AUTO_RESOLVE_CODE || 'false' }}
      - name: Check deploy cooldown
        id: cooldown
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_prod == 'true' }}
        run: bash scripts/vercel-deploy-cooldown.sh
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          VERCEL_DEPLOY_COOLDOWN_MINUTES: ${{ vars.VERCEL_DEPLOY_COOLDOWN_MINUTES || '60' }}

      - name: Deploy to Vercel (optional, rate-limit safe)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_prod == 'true' && steps.cooldown.outcome != 'failure' }}
        run: bash scripts/vercel-safe-deploy.sh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
