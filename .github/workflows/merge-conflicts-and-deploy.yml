name: Resolve Merge Conflicts and Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch a ser sincronizada com main"
        required: true
        default: "main"
      deploy_prod:
        description: "Fazer deploy em produção após sucesso"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  merge-resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: bash scripts/resolve-merge-and-deploy.sh main
        env:
          CI: true
      - name: Deploy to Vercel (optional)
        if: ${{ github.event.inputs.deploy_prod == 'true' }}
        run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
