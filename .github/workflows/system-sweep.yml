name: System Sweep

on:
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * *"

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Run full system sweep
        run: bash scripts/system-sweep.sh
      - name: Upload sweep report
        uses: actions/upload-artifact@v4
        with:
          name: system-sweep-report
          path: reports/*.md
