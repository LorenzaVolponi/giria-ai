name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint (if exists)
        run: npm run lint --if-present
      - name: Build
        run: npm run build
      - name: Tests (if exists)
        run: npm test --if-present
