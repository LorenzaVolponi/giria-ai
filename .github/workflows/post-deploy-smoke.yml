name: Post Deploy Smoke

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL do ambiente para smoke test"
        required: true
        default: "https://example.vercel.app"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: health check
        run: |
          curl -fsS "${{ github.event.inputs.target_url }}/api/v1/health"
      - name: translate check
        run: |
          curl -fsS -X POST "${{ github.event.inputs.target_url }}/api/v1/translate" \
            -H 'content-type: application/json' \
            -d '{"text":"slay"}'
