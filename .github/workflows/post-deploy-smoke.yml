name: Post Deploy Smoke

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL do ambiente para smoke test"
        required: true
        default: "https://example.vercel.app"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run smoke script
        env:
          BASE_URL: ${{ github.event.inputs.target_url }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          bash scripts/post-deploy-smoke.sh "$BASE_URL"
