name: CI Guard

on:
  pull_request:
  push:
    branches:
      - main
      - work

concurrency:
  group: ci-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Predeploy guard
        run: npm run predeploy:guard
