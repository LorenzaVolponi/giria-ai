name: Security Checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit (high+)
        run: npm audit --audit-level=high || true
      - name: project security check
        run: bash scripts/security-check.sh
