name: Auto Fix and Merge

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint -- --fix || true
      - run: npm run build
      - run: bash scripts/security-check.sh
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto fix & security maintenance"
          title: "chore: auto fix & security maintenance"
          body: "PR automático gerado por workflow de manutenção e segurança."
          branch: bot/auto-fix
          delete-branch: true
          labels: automerge
